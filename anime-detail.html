<style>
:root{
  --bg:#07080f;--bg2:#0c0e1a;--bg3:#111320;
  --text:#e8e4d9;--text2:rgba(232,228,217,.5);--text3:rgba(232,228,217,.28);--text4:rgba(232,228,217,.18);
  --gold:#c9a84c;--green:#5dcaa5;--blue:#8ab4d4;--pink:#ed93b1;
  --border:rgba(232,228,217,.08);--border2:rgba(232,228,217,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;border-bottom:.5px solid var(--border);background:rgba(7,8,15,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:700;color:var(--text)}
.nav-logo .arch{color:var(--gold);font-family:'EB Garamond',serif;font-style:italic;font-weight:600;margin-left:.4em}
.nav-menu{display:flex;gap:3rem;align-items:center}
.nav-menu a{font-size:13px;color:var(--text2);letter-spacing:.1em;transition:color .2s}
.nav-menu a:hover{color:var(--text)}
.nav-menu a.active{color:var(--text)}

/* BREADCRUMB */
.crumb{padding:1.5rem 2.5rem 0;max-width:1100px;margin:0 auto;font-size:12px;color:var(--text3);letter-spacing:.04em}
.crumb a{color:var(--text2);transition:color .2s}
.crumb a:hover{color:var(--gold)}
.crumb .sep{margin:0 .6em;color:var(--text4)}

/* HERO */
.hero{padding:2rem 2.5rem 3rem;max-width:1100px;margin:0 auto;border-bottom:.5px solid var(--border)}
.hero-eyebrow{font-family:'EB Garamond',serif;font-size:14px;color:var(--gold);letter-spacing:.06em;font-weight:600;margin-bottom:.85rem}
.hero-title{font-family:'Shippori Mincho',serif;font-size:clamp(36px,5.5vw,58px);font-weight:900;color:var(--text);line-height:1.18;margin-bottom:.5rem;letter-spacing:.005em}
.hero-alt{font-family:'EB Garamond',serif;font-size:15px;color:var(--text3);letter-spacing:.04em;margin-bottom:1.25rem;font-style:italic}
.hero-meta{display:flex;flex-wrap:wrap;gap:1.5rem 2rem;margin-bottom:1.25rem}
.hero-meta-item{font-size:12.5px;color:var(--text2);letter-spacing:.02em}
.hero-meta-item b{display:block;font-size:10px;letter-spacing:.18em;color:var(--text3);text-transform:uppercase;font-weight:400;margin-bottom:.25rem}
.hero-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.hero-tag{font-size:11px;letter-spacing:.04em;border:.5px solid var(--border2);color:var(--text2);padding:3px 11px;border-radius:14px}
.hero-desc{font-size:14px;color:var(--text2);line-height:1.95;max-width:780px}

/* SECTIONS */
.section{padding:3.5rem 2.5rem;max-width:1100px;margin:0 auto;border-bottom:.5px solid var(--border)}
.section:last-of-type{border-bottom:none}
.section-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(201,168,76,.6);margin-bottom:.6rem;font-weight:700}
.section-title{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:.5rem}
.section-sub{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:2rem}

/* TV SERIES BLOCK */
.tv-series{margin-bottom:2.25rem;background:var(--bg2);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.tv-series:last-child{margin-bottom:0}
.tv-head{padding:1.25rem 1.5rem;border-bottom:.5px solid var(--border);background:rgba(232,228,217,.02)}
.tv-name{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:.2rem}
.tv-meta{font-size:12px;color:var(--text3);letter-spacing:.04em;font-family:'EB Garamond',serif}
.theme-table{width:100%;border-collapse:collapse}
.theme-table th{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);font-weight:400;text-align:left;padding:.85rem 1.5rem;border-bottom:.5px solid var(--border)}
.theme-table th:last-child{text-align:right}
.theme-table td{padding:1.1rem 1.5rem;font-size:13px;color:var(--text2);border-bottom:.5px solid var(--border);vertical-align:middle}
.theme-table tr:last-child td{border-bottom:none}
.theme-table tr:hover td{background:rgba(232,228,217,.025)}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:3px;text-transform:uppercase}
.badge.op{background:rgba(201,168,76,.12);color:var(--gold);border:.5px solid rgba(201,168,76,.3)}
.badge.ed{background:rgba(138,180,212,.1);color:var(--blue);border:.5px solid rgba(138,180,212,.3)}
.badge.insert{background:rgba(232,228,217,.04);color:var(--text2);border:.5px solid var(--border2)}
.song-cell{font-family:'Shippori Mincho',serif;font-size:14.5px;font-weight:700;color:var(--text)}
.artist-link{color:var(--gold);transition:opacity .2s;display:inline-flex;align-items:center;gap:.3rem}
.artist-link:hover{opacity:.75}
.artist-link::after{content:'→';font-size:11px;opacity:.6;transition:transform .2s}
.artist-link:hover::after{transform:translateX(2px)}
.episodes{font-family:'EB Garamond',serif;font-size:12px;color:var(--text3);text-align:right;letter-spacing:.04em;white-space:nowrap}

/* MOVIE LIST */
.movies-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:14px}
.movie-card{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:1.5rem 1.65rem;transition:border-color .22s}
.movie-card:hover{border-color:rgba(201,168,76,.35)}
.movie-year{font-family:'EB Garamond',serif;font-size:14px;color:var(--gold);font-weight:600;letter-spacing:.04em;margin-bottom:.4rem}
.movie-title{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:700;color:var(--text);line-height:1.38;margin-bottom:1rem;letter-spacing:.005em}
.movie-divider{height:1px;background:var(--border);margin-bottom:.85rem}
.movie-songs{display:flex;flex-direction:column;gap:.65rem}
.movie-song{display:flex;align-items:center;gap:.85rem;flex-wrap:wrap}
.movie-song-info{flex:1;min-width:0}
.movie-song-name{font-family:'Shippori Mincho',serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:.15rem;line-height:1.4}
.movie-song-artist{font-size:12px}

/* RELATED MEDIA */
.related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.media-card{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:1.5rem;transition:all .22s;display:block}
.media-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-2px)}
.media-type{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:3px 9px;border-radius:3px;margin-bottom:.85rem}
.media-type.manga{color:var(--green);border:.5px solid rgba(80,200,140,.3);background:rgba(80,200,140,.05)}
.media-type.novel{color:var(--pink);border:.5px solid rgba(212,83,126,.3);background:rgba(212,83,126,.05)}
.media-type.game{color:var(--blue);border:.5px solid rgba(138,180,212,.3);background:rgba(138,180,212,.05)}
.media-title{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:.4rem;line-height:1.4}
.media-author{font-size:12.5px;color:var(--text2);line-height:1.7;margin-bottom:.4rem}
.media-period{font-family:'EB Garamond',serif;font-size:12px;color:var(--text3);letter-spacing:.04em}
.media-link{font-size:12px;color:var(--gold);margin-top:.85rem;display:inline-block}

/* EMPTY/NOT FOUND */
.notfound{padding:6rem 2rem;text-align:center;max-width:600px;margin:0 auto}
.notfound h2{font-family:'Shippori Mincho',serif;font-size:28px;color:var(--text);margin-bottom:1rem}
.notfound p{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:2rem}
.notfound a{display:inline-block;background:var(--gold);color:#07080f;padding:12px 24px;border-radius:8px;font-weight:700;font-size:13px}

/* CTA */
.cta-bar{padding:2.5rem 2.5rem;max-width:1100px;margin:0 auto;display:flex;gap:14px;flex-wrap:wrap;border-top:.5px solid var(--border)}
.cta-btn{flex:1;min-width:220px;background:transparent;border:.5px solid var(--border2);border-radius:6px;color:var(--text3);font-size:13px;letter-spacing:.04em;padding:1rem 1.5rem;text-align:center;transition:all .22s}
.cta-btn:hover{border-color:rgba(201,168,76,.5);color:var(--text2)}

/* FOOTER */
.footer{padding:2rem;border-top:.5px solid var(--border);text-align:center}
.footer-logo{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:.4rem}
.footer-sub{font-size:11px;color:var(--text3)}

@media(max-width:760px){
  .nav{padding:.9rem 1.5rem}.nav-menu{gap:1.5rem}.nav-menu a{font-size:12px}
  .crumb,.hero,.section,.cta-bar{padding-left:1.5rem;padding-right:1.5rem}
  .theme-table th,.theme-table td{padding:.75rem .9rem;font-size:12px}
  .song-cell{font-size:13px}
  .movies-grid{grid-template-columns:1fr}
  .episodes{text-align:left;font-size:11px}
}
</style>

    studio:'WIT STUDIO / CloverWorks',
    director:'古橋一浩',
    period:'2022 — 現在',
    tags:['コメディ','アクション','令和','家族'],
    desc:'遠藤達哉の漫画を原作に、スパイ・殺し屋・超能力者が偽装家族を演じる令和のヒット作。OPはOfficial髭男dism、Adoなど豪華アーティストが担当。',
    tv: [
      {
        name:'第1期 / 第2期',
        meta:'2022年4月 — 2023年12月 / 全37話',
        themes:[
          {type:'op', song:'ミックスナッツ', artist:'Official髭男dism', artistName:'Official髭男dism'},
          {type:'op', song:'SOUVENIR', artist:'BUMP OF CHICKEN', artistName:'BUMP OF CHICKEN'},
          {type:'op', song:'クラクラ', artist:'Ado', artistName:'Ado'},
          {type:'op', song:'刹那の歌', artist:'Vaundy', artistName:'Vaundy'},
          {type:'ed', song:'喜劇', artist:'星野源', artistName:'星野源'},
          {type:'ed', song:'色彩', artist:'yama', artistName:'yama'},
          {type:'ed', song:'今しかない', artist:'Ado', artistName:'Ado'},
        ]
      }
    ],
    movies: [
      {year:2023, title:'劇場版 SPY×FAMILY CODE: White', songs:[
        {type:'op', label:'主題歌', song:'(VAUNDY系)テーマ曲', artist:'Ado', artistName:'Ado'}
      ]},
    ],
    related: [
      {type:'manga', name:'manga', title:'SPY×FAMILY', author:'遠藤達哉', publisher:'集英社「少年ジャンプ＋」', period:'2019 — 連載中', link:'#'},
    ]
  },

};

// ==================== RENDER ====================
const id = new URLSearchParams(location.search).get('id');
const data = ANIME_DATA[id];

if (!data) {
  document.getElementById('crumb-current').textContent = '見つかりませんでした';
  document.getElementById('page').innerHTML = `
    <div class="notfound">
      <h2>作品が見つかりません</h2>
      <p>ID「${id || '(指定なし)'}」のデータがまだ用意されていません。<br>アニメ一覧から作品を選択してください。</p>
      <a href="anime.html">← アニメ一覧へ戻る</a>
    </div>
  `;
} else {
  document.getElementById('crumb-current').textContent = data.title;
  document.title = `${data.title} — 時代 Archive`;

  // helper: artist link
  const artistLink = (name, displayName) => {
    const safe = encodeURIComponent(name);
    return `<a class="artist-link" href="artist.html?name=${safe}&category=anime-musician">${displayName || name}</a>`;
  };

  // ==== HERO ====
  const heroHTML = `
    <section class="hero">
      <div class="hero-eyebrow">${data.eyebrow}</div>
      <h1 class="hero-title">${data.title}</h1>
      <div class="hero-alt">${data.altTitle}</div>
      <div class="hero-meta">
        <div class="hero-meta-item"><b>Studio</b>${data.studio}</div>
        <div class="hero-meta-item"><b>Director</b>${data.director}</div>
        <div class="hero-meta-item"><b>Period</b>${data.period}</div>
      </div>
      <div class="hero-tags">${data.tags.map(t => `<span class="hero-tag">${t}</span>`).join('')}</div>
      <p class="hero-desc">${data.desc}</p>
    </section>
  `;

  // ==== TV SECTION ====
  let tvHTML = '';
  if(data.tv && data.tv.length > 0){
    tvHTML = `
      <section class="section">
        <div class="section-eyebrow">TV Broadcast</div>
        <h2 class="section-title">テレビ放送 主題歌</h2>
        <p class="section-sub">放送順に、すべてのオープニング・エンディング。アーティスト名をクリックすると詳細ページへ。</p>
        ${data.tv.map(tv => `
          <div class="tv-series">
            <div class="tv-head">
              <div class="tv-name">${tv.name}</div>
              <div class="tv-meta">${tv.meta}</div>
            </div>
            <table class="theme-table">
              <thead>
                <tr>
                  <th style="width:60px">区分</th>
                  <th>曲名</th>
                  <th>アーティスト</th>
                  <th>使用話数</th>
                </tr>
              </thead>
              <tbody>
                ${tv.themes.map(th => `
                  <tr>
                    <td><span class="badge ${th.type}">${th.type === 'op' ? 'OP' : (th.type === 'ed' ? 'ED' : '挿入')}</span></td>
                    <td class="song-cell">${th.song}</td>
                    <td>${artistLink(th.artistName || th.artist, th.artist)}</td>
                    <td class="episodes">${th.episodes || '—'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `).join('')}
      </section>
    `;
  }

  // ==== MOVIES ====
  let movieHTML = '';
  if(data.movies && data.movies.length > 0){
    movieHTML = `
      <section class="section">
        <div class="section-eyebrow">Films</div>
        <h2 class="section-title">劇場版</h2>
        <p class="section-sub">公開順。各作品の主題歌・挿入歌のアーティストもすべて辿れる。</p>
        <div class="movies-grid">
          ${data.movies.map(m => `
            <div class="movie-card">
              <div class="movie-year">${m.year}</div>
              <div class="movie-title">${m.title}</div>
              <div class="movie-divider"></div>
              <div class="movie-songs">
                ${m.songs.map(s => `
                  <div class="movie-song">
                    <span class="badge ${s.type}">${s.label || (s.type === 'op' ? 'OP' : 'ED')}</span>
                    <div class="movie-song-info">
                      <div class="movie-song-name">${s.song}</div>
                      <div class="movie-song-artist">${artistLink(s.artistName || s.artist, s.artist)}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </section>
    `;
  }

  // ==== RELATED MEDIA ====
  let relatedHTML = '';
  if(data.related && data.related.length > 0){
    const typeLabel = {manga:'漫画 / Manga', novel:'小説 / Novel', game:'ゲーム / Game'};
    relatedHTML = `
      <section class="section">
        <div class="section-eyebrow">Related Media</div>
        <h2 class="section-title">原作・関連メディア</h2>
        <p class="section-sub">この作品に関連する漫画・小説など。原作からアニメへ、メディアを横断して辿れる。</p>
        <div class="related-grid">
          ${data.related.map(r => `
            <a class="media-card" href="${r.link || '#'}">
              <span class="media-type ${r.name}">${typeLabel[r.name] || r.type}</span>
              <div class="media-title">${r.title}</div>
              <div class="media-author">${r.author}</div>
              <div class="media-period">${r.publisher} · ${r.period}</div>
              <div class="media-link">詳細を見る →</div>
            </a>
          `).join('')}
        </div>
      </section>
    `;
  }

  // ==== CTA ====
  const ctaHTML = `
    <div class="cta-bar">
      <a class="cta-btn" href="anime.html">← アニメ一覧へ戻る</a>
      <a class="cta-btn" href="home.html">時代 Archive トップへ</a>
      <a class="cta-btn" href="index.html">音楽アーカイブを見る →</a>
    </div>
  `;

  document.getElementById('page').innerHTML = heroHTML + tvHTML + movieHTML + relatedHTML + ctaHTML;
}
</script>
</body>
</html>
