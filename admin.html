<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時代 Archive — 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080f;--bg2:#0c0e1a;--bg3:#111320;--text:#e8e4d9;--text2:rgba(232,228,217,.5);--text3:rgba(232,228,217,.28);--gold:#c9a84c;--border:rgba(232,228,217,.08);--border2:rgba(232,228,217,.15);--radius:8px;--green:#4caf7d;--red:#e05555}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;padding-bottom:5rem}

.nav{display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;border-bottom:.5px solid var(--border);background:rgba(7,8,15,.95)}
.nav-logo{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-decoration:none}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-badge{font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;border-radius:3px;background:rgba(201,168,76,.15);border:.5px solid rgba(201,168,76,.3);color:var(--gold)}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:3px;border:.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.login-zone{max-width:400px;margin:4rem auto;padding:2rem;background:var(--bg2);border:.5px solid var(--border2);border-radius:12px;text-align:center}
.login-title{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:.5rem}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:1.5rem}
.login-input{width:100%;background:var(--bg);border:.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;padding:10px 14px;outline:none;margin-bottom:1rem;transition:border-color .2s}
.login-input:focus{border-color:rgba(201,168,76,.5)}
.login-input::placeholder{color:var(--text3)}
.login-btn{width:100%;background:var(--gold);color:#07080f;border:none;border-radius:6px;padding:11px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:hover{background:#e0be6a}
.login-error{font-size:12px;color:var(--red);margin-top:.5rem;display:none}

.main{padding:2rem;display:none}
.page-title{font-family:'Shippori Mincho',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:.4rem}
.page-sub{font-size:12px;color:var(--text2);margin-bottom:2rem}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
.stat-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.stat-num{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:3px}

.tabs{display:flex;gap:0;border-bottom:.5px solid var(--border);margin-bottom:1.5rem}
.tab{font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:10px 16px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:1.5px solid transparent;transition:all .18s;font-family:'Zen Kaku Gothic New',sans-serif}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:rgba(201,168,76,.6)}

.sec-lbl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
.sec-lbl::after{content:'';flex:1;height:.5px;background:var(--border)}

.pending-list{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem}
.pending-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.15rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center}
.pc-name{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px}
.pc-sub{font-size:11px;color:var(--text2)}
.pc-genre{font-size:10px;padding:2px 8px;border-radius:10px;border:.5px solid rgba(201,168,76,.25);color:rgba(201,168,76,.7);display:inline-block;margin-top:4px}
.pc-actions{display:flex;gap:6px;flex-shrink:0}
.btn-approve{background:rgba(76,175,125,.15);border:.5px solid rgba(76,175,125,.4);color:#4caf7d;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .18s;white-space:nowrap}
.btn-approve:hover{background:rgba(76,175,125,.25)}
.btn-reject{background:rgba(224,85,85,.1);border:.5px solid rgba(224,85,85,.3);color:var(--red);padding:6px 14px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .18s;white-space:nowrap}
.btn-reject:hover{background:rgba(224,85,85,.2)}
.btn-revoke{background:rgba(224,85,85,.08);border:.5px solid rgba(224,85,85,.2);color:rgba(224,85,85,.7);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .18s;white-space:nowrap}
.btn-revoke:hover{background:rgba(224,85,85,.18)}

.approved-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden}
.approved-row{display:grid;grid-template-columns:1fr auto;align-items:center;padding:.75rem 1rem;background:var(--bg2);transition:background .15s}
.approved-row:hover{background:var(--bg3)}
.ar-left{display:flex;flex-direction:column;gap:2px}
.ar-name{font-family:'Shippori Mincho',serif;font-size:14px;font-weight:700;color:var(--text)}
.ar-sub{font-size:11px;color:var(--text3)}
.ar-right{display:flex;align-items:center;gap:8px}
.ar-genre{font-size:10px;padding:2px 8px;border-radius:10px;border:.5px solid rgba(201,168,76,.2);color:rgba(201,168,76,.6)}

.empty{padding:2rem;text-align:center;font-size:13px;color:var(--text3)}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg2);border:.5px solid rgba(76,175,125,.4);border-radius:8px;padding:.75rem 1.25rem;font-size:13px;color:#4caf7d;display:none;z-index:999;max-width:300px}
.toast.show{display:block}
.toast.error{border-color:rgba(224,85,85,.4);color:var(--red)}

.loading{padding:2rem;text-align:center}
.ld-dots{display:flex;gap:6px;justify-content:center;margin-bottom:.5rem}
.ld-dot{width:7px;height:7px;border-radius:50%;background:rgba(201,168,76,.4);animation:ldp 1.2s ease-in-out infinite}
.ld-dot:nth-child(2){animation-delay:.2s}.ld-dot:nth-child(3){animation-delay:.4s}
@keyframes ldp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">時代 Archive</a>
  <div class="nav-right">
    <span class="nav-badge">管理画面</span>
    <button class="logout-btn" id="logout-btn" onclick="logout()" style="display:none">ログアウト</button>
  </div>
</nav>

<div id="login-zone" class="login-zone">
  <div class="login-title">管理者ログイン</div>
  <div class="login-sub">管理者キーを入力してください</div>
  <input class="login-input" id="admin-key-input" type="password" placeholder="管理者キー" onkeydown="if(event.key==='Enter')login()"/>
  <button class="login-btn" onclick="login()">ログイン</button>
  <div class="login-error" id="login-error">管理者キーが正しくありません</div>
</div>

<div class="main" id="main">
  <div class="page-title">管理画面</div>
  <div class="page-sub">アーティストの承認・管理ができます</div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="stat-pending">—</div>
      <div class="stat-lbl">承認待ち</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-approved">—</div>
      <div class="stat-lbl">承認済み</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-lbl">合計</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab(this,'pending')">承認待ち</button>
    <button class="tab" onclick="setTab(this,'approved')">承認済み</button>
  </div>

  <div id="tab-pending">
    <div class="sec-lbl">承認待ちアーティスト</div>
    <div id="pending-loading" class="loading">
      <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
    </div>
    <div class="pending-list" id="pending-list"></div>
  </div>

  <div id="tab-approved" style="display:none">
    <div class="sec-lbl">承認済みアーティスト — 取り消しも可能</div>
    <div id="approved-loading" class="loading">
      <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
    </div>
    <div class="approved-list" id="approved-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://jidai-archive-next.vercel.app';
let adminKey = '';

// ページ読み込み時にlocalStorageからキーを復元
window.addEventListener('load', () => {
  const saved = localStorage.getItem('admin_key');
  if (saved) {
    adminKey = saved;
    loadData();
  }
});

function login() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  adminKey = key;
  loadData();
}

function logout() {
  localStorage.removeItem('admin_key');
  adminKey = '';
  document.getElementById('login-zone').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('admin-key-input').value = '';
}

async function loadData() {
  try {
    const res = await fetch(API_BASE + '/api/artists/pending?key=' + adminKey);
    if (res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      localStorage.removeItem('admin_key');
      adminKey = '';
      return;
    }
    const pending = await res.json();
    const approvedRes = await fetch(API_BASE + '/api/artists');
    const approved = await approvedRes.json();

    // ログイン成功 → localStorageに保存
    localStorage.setItem('admin_key', adminKey);

    document.getElementById('login-zone').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    document.getElementById('logout-btn').style.display = 'block';

    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-approved').textContent = approved.length;
    document.getElementById('stat-total').textContent = pending.length + approved.length;

    renderPending(pending);
    renderApproved(approved);
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'エラー: ' + e.message;
    localStorage.removeItem('admin_key');
  }
}

function renderPending(pending) {
  document.getElementById('pending-loading').style.display = 'none';
  const list = document.getElementById('pending-list');
  list.innerHTML = '';
  if (pending.length === 0) {
    list.innerHTML = '<div class="empty">承認待ちのアーティストはいません</div>';
    return;
  }
  pending.forEach(a => {
    const card = document.createElement('div');
    card.className = 'pending-card';
    card.id = 'card-' + a.name;
    card.innerHTML =
      '<div>' +
      '<div class="pc-name">' + a.name + '</div>' +
      '<div class="pc-sub">' + (a.nameEn || '') + ' · ' + (a.era || '') + '</div>' +
      '<span class="pc-genre">' + (a.genre || '') + '</span>' +
      '</div>' +
      '<div class="pc-actions">' +
      '<button class="btn-approve" onclick="approve(\'' + a.name.replace(/'/g, "\\'") + '\')">✓ 承認</button>' +
      '<button class="btn-reject" onclick="reject(\'' + a.name.replace(/'/g, "\\'") + '\')">✗ 却下</button>' +
      '</div>';
    list.appendChild(card);
  });
}

function renderApproved(approved) {
  document.getElementById('approved-loading').style.display = 'none';
  const list = document.getElementById('approved-list');
  list.innerHTML = '';
  if (approved.length === 0) {
    list.innerHTML = '<div class="empty">承認済みのアーティストはいません</div>';
    return;
  }
  approved.forEach(a => {
    const row = document.createElement('div');
    row.className = 'approved-row';
    row.id = 'approved-' + a.name;
    row.innerHTML =
      '<div class="ar-left">' +
      '<div class="ar-name">' + a.name + '</div>' +
      '<div class="ar-sub">' + (a.nameEn || '') + ' · ' + (a.era || '') + '</div>' +
      '</div>' +
      '<div class="ar-right">' +
      '<span class="ar-genre">' + (a.genre || '').split('・')[0] + '</span>' +
      '<button class="btn-revoke" onclick="revoke(\'' + a.name.replace(/'/g, "\\'") + '\')">取り消し</button>' +
      '</div>';
    list.appendChild(row);
  });
}

async function approve(name) {
  try {
    const res = await fetch(API_BASE + '/api/artists/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, action: 'approve', adminKey })
    });
    if (!res.ok) throw new Error('Failed');
    showToast('✓ ' + name + ' を承認しました');
    document.getElementById('card-' + name)?.remove();
    updateStats(-1, 1);
  } catch(e) { showToast('エラー: ' + e.message, true); }
}

async function reject(name) {
  try {
    const res = await fetch(API_BASE + '/api/artists/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, action: 'reject', adminKey })
    });
    if (!res.ok) throw new Error('Failed');
    showToast('✗ ' + name + ' を却下しました');
    document.getElementById('card-' + name)?.remove();
    updateStats(-1, 0);
  } catch(e) { showToast('エラー: ' + e.message, true); }
}

async function revoke(name) {
  if (!confirm(name + ' の承認を取り消しますか？')) return;
  try {
    const res = await fetch(API_BASE + '/api/artists/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, action: 'revoke', adminKey })
    });
    if (!res.ok) throw new Error('Failed');
    showToast('↩ ' + name + ' の承認を取り消しました');
    document.getElementById('approved-' + name)?.remove();
    updateStats(0, -1);
  } catch(e) { showToast('エラー: ' + e.message, true); }
}

function updateStats(pendingDelta, approvedDelta) {
  const p = parseInt(document.getElementById('stat-pending').textContent) + pendingDelta;
  const a = parseInt(document.getElementById('stat-approved').textContent) + approvedDelta;
  document.getElementById('stat-pending').textContent = Math.max(0, p);
  document.getElementById('stat-approved').textContent = Math.max(0, a);
  document.getElementById('stat-total').textContent = Math.max(0, p) + Math.max(0, a);
}

function setTab(btn, id) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['pending','approved'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === id ? 'block' : 'none';
  });
}

function showToast(msg, isError) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
