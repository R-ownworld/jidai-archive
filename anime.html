<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アニメ — 時代 Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080f;--bg2:#0c0e1a;--bg3:#111320;
  --text:#e8e4d9;--text2:rgba(232,228,217,.5);--text3:rgba(232,228,217,.28);--text4:rgba(232,228,217,.18);
  --gold:#c9a84c;--border:rgba(232,228,217,.08);--border2:rgba(232,228,217,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* ==================== NAV ==================== */
.nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;border-bottom:.5px solid var(--border);background:rgba(7,8,15,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:700;letter-spacing:.08em;color:var(--text)}
.nav-logo .arch{color:var(--gold);font-family:'EB Garamond',serif;font-style:italic;font-weight:600;margin-left:.4em;letter-spacing:.02em}
.nav-menu{display:flex;gap:3rem;align-items:center}
.nav-menu a{font-size:13px;color:var(--text2);letter-spacing:.1em;transition:color .2s}
.nav-menu a:hover{color:var(--text)}
.nav-menu a.active{color:var(--text)}

/* ==================== HERO ==================== */
.hero{position:relative;padding:5rem 2.5rem 3.5rem;overflow:hidden;display:grid;grid-template-columns:auto 1fr;gap:2rem;align-items:center;min-height:380px}
.hero-decade{font-family:'EB Garamond',serif;font-weight:600;font-size:clamp(120px,16vw,200px);color:rgba(232,228,217,.05);letter-spacing:-.03em;line-height:.85;user-select:none;align-self:center;padding-left:1.5rem;flex-shrink:0}
.hero-content{padding-right:2rem}
.era-badge{display:inline-block;border:1px solid var(--gold);color:var(--gold);font-family:'EB Garamond',serif;font-size:14px;font-weight:600;letter-spacing:.05em;padding:.55rem 1.25rem;margin-bottom:1.5rem;line-height:1.2}
.era-badge .y{display:inline-block}
.era-badge .dash{display:inline-block;margin:0 .5rem;opacity:.7}
.hero-title{font-family:'Shippori Mincho',serif;font-size:clamp(38px,5.4vw,60px);font-weight:900;color:var(--text);line-height:1.18;margin-bottom:1.4rem;letter-spacing:.005em}
.hero-sub{font-size:14px;color:var(--text2);line-height:2.05;max-width:480px;letter-spacing:.02em}

/* ==================== YEAR NAV ==================== */
.year-nav-wrap{padding:0 2.5rem 3.5rem}
.year-nav{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;max-width:1280px;margin:0 auto}
.year-chip{background:transparent;border:.5px solid var(--border);color:var(--text4);font-family:'EB Garamond',serif;font-size:18px;font-weight:600;letter-spacing:.04em;padding:1.1rem 1.25rem;cursor:pointer;transition:all .22s;text-align:left;border-radius:2px}
.year-chip:hover{border-color:rgba(201,168,76,.4);color:var(--text2)}
.year-chip.active{border-color:rgba(201,168,76,.5);color:var(--gold);background:rgba(201,168,76,.04)}

/* ==================== SECTION HEADER ==================== */
.section{padding:0 2.5rem 4rem;max-width:1280px;margin:0 auto}
.section-head{font-size:11px;letter-spacing:.18em;color:var(--text3);margin-bottom:1.25rem;font-weight:400}
.section-head .sep{color:var(--text4);margin:0 .8em}

/* ==================== ANIME GRID ==================== */
.anime-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:.5px solid var(--border);border-left:.5px solid var(--border)}
.anime-card{background:var(--bg2);border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);padding:1.85rem 1.85rem 1.5rem;display:flex;flex-direction:column;min-height:240px;cursor:pointer;transition:background .22s;position:relative}
.anime-card:hover{background:#10131f}
.anime-card.empty{background:rgba(15,17,30,.35);cursor:default;pointer-events:none}
.anime-year{font-family:'EB Garamond',serif;font-size:15px;font-weight:600;color:var(--gold);letter-spacing:.04em;margin-bottom:1rem}
.anime-title{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;color:var(--text);line-height:1.32;margin-bottom:.5rem;letter-spacing:.005em}
.anime-studio{font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:1.1rem;letter-spacing:.01em}
.anime-divider{height:1px;background:var(--border);margin:0 0 .9rem}
.anime-op-label{font-family:'Shippori Mincho',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.08em;margin-bottom:.45rem}
.anime-op-song{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:1rem;letter-spacing:.01em}
.anime-tags{display:flex;gap:7px;margin-top:auto}
.anime-tag{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:.5px solid var(--border2);color:var(--text2);font-size:10.5px;letter-spacing:0;line-height:1.15;text-align:center;word-break:break-all;overflow-wrap:anywhere;padding:2px;font-weight:400}

/* ==================== THEME TABLE ==================== */
.theme-table{width:100%;border-collapse:collapse}
.theme-table thead th{font-size:11px;letter-spacing:.18em;color:var(--text3);font-weight:400;text-align:left;padding:1rem 1.5rem;border-bottom:.5px solid var(--border)}
.theme-table thead th:last-child{text-align:right}
.theme-table tbody tr{border-bottom:.5px solid var(--border);transition:background .15s}
.theme-table tbody tr:hover{background:rgba(232,228,217,.02)}
.theme-table tbody td{padding:1.35rem 1.5rem;font-size:13px;color:var(--text2);letter-spacing:.02em}
.theme-table tbody td.song{font-family:'Shippori Mincho',serif;font-size:15.5px;font-weight:700;color:var(--text)}
.theme-table tbody td.work{color:var(--gold);font-weight:400}
.theme-table tbody td.year{font-family:'EB Garamond',serif;font-size:13px;color:var(--text3);text-align:right;letter-spacing:.04em}

/* ==================== ACTION BAR ==================== */
.action-bar{padding:2.5rem 2.5rem 1.5rem;display:flex;gap:14px;flex-wrap:wrap;justify-content:flex-start;border-top:.5px solid var(--border);max-width:1280px;margin:2rem auto 0}
.action-btn{background:transparent;border:.5px solid var(--border2);color:var(--text3);font-size:13px;letter-spacing:.04em;padding:.95rem 1.6rem;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;gap:.6rem;min-width:200px;justify-content:space-between;border-radius:2px}
.action-btn:hover{border-color:rgba(201,168,76,.4);color:var(--text2)}
.action-btn .arrow{font-size:13px}

/* ==================== FOOTER ==================== */
.footer{padding:2rem;text-align:center;border-top:.5px solid var(--border);margin-top:2rem}
.footer-logo{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:.4rem}
.footer-sub{font-size:11px;color:var(--text3)}

.fade{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ==================== RESPONSIVE ==================== */
@media(max-width:900px){
  .nav{padding:.9rem 1.5rem}
  .nav-menu{gap:1.5rem}
  .nav-menu a{font-size:12px}
  .hero{grid-template-columns:1fr;padding:3rem 1.5rem 2.5rem;gap:0}
  .hero-decade{padding-left:0;font-size:120px;opacity:.6}
  .hero-content{padding-right:0}
  .year-nav-wrap,.section{padding-left:1.5rem;padding-right:1.5rem}
  .year-nav{grid-template-columns:repeat(3,1fr)}
  .year-chip{font-size:15px;padding:.85rem 1rem}
  .anime-grid{grid-template-columns:repeat(2,1fr)}
  .theme-table thead th,.theme-table tbody td{padding:.85rem .9rem;font-size:12px}
  .theme-table tbody td.song{font-size:13px}
}
@media(max-width:560px){
  .anime-grid{grid-template-columns:1fr}
  .year-nav{grid-template-columns:repeat(2,1fr)}
  .action-btn{min-width:0;flex:1}
}
</style>
</head>

<!-- ==================== ACTION BAR ==================== -->
<div class="action-bar">

  <button class="action-btn" onclick="exportHTML()">

  </button>
</div>

<footer class="footer">
  <div class="footer-logo">時代 Archive</div>
  <div class="footer-sub">Japan Culture Archive · 1960s — 2020s</div>

// ==================== RENDER ====================
let currentEra = '1990';

function renderEra(eraKey){
  const data = ERA_DATA[eraKey];
  if(!data) return;
  currentEra = eraKey;

  // hero
  document.getElementById('hero-decade').textContent = data.decade;
  document.getElementById('era-from').textContent = data.from;
  document.getElementById('era-to').textContent = data.to;
  document.getElementById('era-title').innerHTML = data.title;
  document.getElementById('era-sub').innerHTML = data.sub;

  // re-trigger fade
  const hc = document.getElementById('hero-content');
  hc.classList.remove('fade'); void hc.offsetWidth; hc.classList.add('fade');

  // year chips active
  document.querySelectorAll('.year-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.era === eraKey);
  });

  // anime grid: render exactly 6 cards
  const grid = document.getElementById('anime-grid');
  grid.innerHTML = data.works.map(w => `
    <a class="anime-card fade" href="#" onclick="event.preventDefault()">
      <div class="anime-year">${w.year}</div>
      <h3 class="anime-title">${w.title}</h3>
      <div class="anime-studio">${w.studio}</div>
      <div class="anime-divider"></div>
      <div class="anime-op-label">${w.opLabel || 'OP'}</div>
      <div class="anime-op-song">${w.op} — ${w.artist}</div>
      <div class="anime-tags">
        ${w.tags.map(t => `<span class="anime-tag">${t}</span>`).join('')}
      </div>
    </a>
  `).join('');

  // theme table: 5 songs in or near this era
  const tbody = document.getElementById('theme-tbody');
  let songs = ALL_SONGS
    .filter(s => s.year >= data.from - 5 && s.year <= data.to + 2)
    .sort((a,b) => a.year - b.year);
  if(songs.length < 5){
    songs = [...songs, ...ALL_SONGS.filter(s => !songs.includes(s))].slice(0,5);
  } else {
    songs = songs.slice(0,5);
  }
  tbody.innerHTML = songs.map(s => `
    <tr>
      <td class="song">${s.song}</td>
      <td>${s.artist}</td>
      <td class="work">${s.work}</td>
      <td class="year">${s.year}</td>
    </tr>
  `).join('');
}

document.querySelectorAll('.year-chip').forEach(chip => {
  chip.addEventListener('click', () => renderEra(chip.dataset.era));
});

// init
renderEra('1990');

// HTML export
function exportHTML(){
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jidai-anime-${currentEra}s.html`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
